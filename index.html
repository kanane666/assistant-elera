<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boutique Dakar — Assistante Awa</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        background: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .chat-container {
        width: 420px;
        height: 550px;
        background: white;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }

      .chat-header {
        padding: 16px;
        background: #1a73e8;
        color: white;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: white;
        color: #1a73e8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 18px;
      }

      .chat-header h2 {
        font-size: 16px;
      }
      .chat-header p {
        font-size: 12px;
        opacity: 0.85;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.5;
      }

      .message.awa {
        background: #f0f0f0;
        align-self: flex-start;
        border-radius: 0 12px 12px 12px;
      }

      .message.user {
        background: #1a73e8;
        color: white;
        align-self: flex-end;
        border-radius: 12px 0 12px 12px;
      }

      .chat-input {
        padding: 12px 16px;
        border-top: 1px solid #eee;
        display: flex;
        gap: 8px;
      }

      .chat-input input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 20px;
        font-size: 14px;
        outline: none;
      }

      .chat-input input:focus {
        border-color: #1a73e8;
      }

      .chat-input button {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #1a73e8;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .chat-input button svg {
        stroke: white;
      }

      .typing {
        font-size: 13px;
        color: #999;
        align-self: flex-start;
        padding: 4px 8px;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div class="avatar">A</div>
        <div>
          <h2>Awa</h2>
          <p>Assistante boutique — En ligne</p>
        </div>
      </div>
      <div
        style="
          text-align: right;
          padding: 6px 16px;
          border-bottom: 1px solid #eee;
        "
      >
        <span
          onclick="effacerHistorique()"
          style="font-size: 12px; color: #999; cursor: pointer"
        >
          Effacer la conversation
        </span>
      </div>

      <div class="messages" id="messages">
        <div class="message awa">
          Bonjour ! Bienvenue dans notre boutique. Comment puis-je vous aider ?
        </div>
      </div>

      <div class="chat-input">
        <input
          type="text"
          id="input"
          placeholder="Écrire un message..."
          onkeydown="if (event.key === 'Enter') envoyer();"
        />
        <button onclick="envoyer()">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="2"
          >
            <path
              d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </div>

    <script>
      const historique = JSON.parse(
        localStorage.getItem("awa_historique") || "[]",
      );

      // Reafficher l'historique au chargement
      window.onload = () => {   // quand la page est chargée
        const messages = document.getElementById("messages"); // trouve la zone de chat
        historique.forEach((msg) => { // pour chaque message sauvegardé
          if (msg.role === "user") { // si c'est un message de l'utilisateur
            messages.innerHTML += `<div class="message user">${msg.content}</div>`; // affiche à droite en bleu
          } else if (msg.role === "assistant") { // si c'est un message de l'assistant awa
            messages.innerHTML += `<div class="message awa">${msg.content}</div>`; // affiche à gauche en gris
          }
        });
        messages.scrollTop = messages.scrollHeight; // faire défiler vers le bas pour voir les derniers messages
      };

      async function envoyer() {
        const input = document.getElementById("input"); // le champ de saisie
        const messages = document.getElementById("messages"); // la zone de chat
        const texte = input.value.trim(); // le texte tapé, sans espaces
        if (!texte) return; // si le texte est vide, ne rien faire

        messages.innerHTML += `<div class="message user">${texte}</div>`; // afficher le message de l'utilisateur à droite en bleu
        historique.push({ role: "user", content: texte }); // ajouter le message à l'historique en mémoire
        input.value = ""; // vider le champ de saisie

        messages.innerHTML += `<div class="typing" id="typing">Awa écrit...</div>`; // afficher un message de "Awa écrit..." pendant que l'on attend la réponse
        messages.scrollTop = messages.scrollHeight; // faire défiler vers le bas pour voir le message de "Awa écrit..."

        const res = await fetch("https://assistant-elera.onrender.com/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ historique }),
        });

        const data = await res.json();
        document.getElementById("typing").remove();
        messages.innerHTML += `<div class="message awa">${data.reponse}</div>`;
        historique.push({ role: "assistant", content: data.reponse });

        // Sauvegarder dans le navigateur
        localStorage.setItem("awa_historique", JSON.stringify(historique));
        messages.scrollTop = messages.scrollHeight;
      }

      // Bouton pour effacer l'historique
      function effacerHistorique() {
        localStorage.removeItem("awa_historique");
        location.reload();
      }
    </script>
  </body>
</html>
